<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duarte Legal — Selección de versión</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3rem;padding:2rem}
    h1{font-size:1.5rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;opacity:.4;text-align:center}
    .cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
    .card{background:#111;border:1px solid rgba(255,255,255,.08);padding:2.5rem 2rem;text-align:center;min-width:260px;text-decoration:none;color:#fff;transition:.3s;display:block}
    .card:hover{transform:translateY(-4px)}
    .dot{width:24px;height:24px;border-radius:50%;margin:0 auto 1.25rem}
    .card strong{display:block;font-size:1rem;font-weight:900;letter-spacing:.08em;margin-bottom:.5rem}
    .card span{font-size:.78rem;color:#666;letter-spacing:.05em}
    .card-a:hover{border-color:#39FF14}
    .card-b:hover{border-color:#006950}
  </style>
</head>
<body>
  <h1>Duarte Legal · Preview de versiones</h1>
  <div class="cards">
    <a class="card card-b" href="verde-bosque.html">
      <div class="dot" style="background:#006950"></div>
      <strong>Verde Bosque</strong>
      <span>#006950 — Institucional</span>
    </a>
    <a class="card card-a" href="neon-original.html">
      <div class="dot" style="background:#39FF14"></div>
      <strong>Neon Original</strong>
      <span>#39FF14 — Tech / Impacto</span>
    </a>
  </div>
</body>
</html>
